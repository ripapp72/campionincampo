<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il mio account — CampioninCampo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="nav">
    <div class="logo">
      <img src="./LOGO.jpg" alt="Logo" class="logo-img">
      CampioninCampo
    </div>
    <div class="nav-links">
      <span onclick="location.href='index.html'">Home</span>
      <span onclick="location.href='club.html'">Club</span>
      <span onclick="location.href='scout.html'">Scout</span>
      <span onclick="location.href='eventi.html'">Eventi</span>
    </div>
    <button class="nav-btn" id="nav-auth-btn" onclick="location.href='login.html'">Accedi</button>
  </nav>

  <!-- CONTENUTO IMPOSTAZIONI -->
  <div class="upload-container" id="impostazioni-container">

    <div class="upload-header">
      <h1>Il mio account</h1>
      <p>Visualizza e modifica i tuoi dati personali</p>
    </div>

    <!-- AVATAR -->
    <div class="upload-card" style="text-align:center;">
      <div id="imp-avatar" style="display:flex; justify-content:center; margin-bottom:16px;"></div>
      <div id="imp-gruppo-logo">
        <div class="form-group">
          <label>Aggiorna logo club <span style="color:#9ca3af; font-weight:400;">(opzionale)</span></label>
          <input type="file" accept="image/*" id="imp-logo">
        </div>
      </div>
    </div>

    <!-- DATI PERSONALI -->
    <div class="upload-card">
      <div class="upload-card-title"><i class="ti ti-user"></i> Dati personali</div>

      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="imp-nome" placeholder="Il tuo nome">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="imp-email" placeholder="La tua email" disabled style="opacity:0.6; cursor:not-allowed;">
        <small style="color:#9ca3af;">L'email non può essere modificata</small>
      </div>

      <div class="form-group">
        <label>Regione</label>
        <select id="imp-regione">
          <option value="">Seleziona regione</option>
          <option>Abruzzo</option>
          <option>Basilicata</option>
          <option>Calabria</option>
          <option>Campania</option>
          <option>Emilia-Romagna</option>
          <option>Friuli-Venezia Giulia</option>
          <option>Lazio</option>
          <option>Liguria</option>
          <option>Lombardia</option>
          <option>Marche</option>
          <option>Molise</option>
          <option>Piemonte</option>
          <option>Puglia</option>
          <option>Sardegna</option>
          <option>Sicilia</option>
          <option>Toscana</option>
          <option>Trentino-Alto Adige</option>
          <option>Umbria</option>
          <option>Valle d'Aosta</option>
          <option>Veneto</option>
        </select>
      </div>

      <div class="form-group" id="imp-gruppo-club">
        <label>Nome club / associazione</label>
        <input type="text" id="imp-club" placeholder="Es. ASD Calcio Perugia">
      </div>

    </div>

    <!-- DATI PRIVATI (visibili solo a te) -->
    <div class="upload-card">
      <div class="upload-card-title"><i class="ti ti-lock"></i> Dati privati <span style="font-size:12px; color:#9ca3af; font-weight:400;">— visibili solo a te</span></div>

      <div class="form-row">
        <div class="form-group">
          <label>Data di nascita</label>
          <input type="date" id="imp-data-nascita" disabled style="opacity:0.7; cursor:not-allowed;">
        </div>
        <div class="form-group">
          <label>Codice fiscale</label>
          <div class="input-icon">
            <input type="password" id="imp-cf" disabled style="opacity:0.7; cursor:not-allowed; text-transform:uppercase;">
            <i class="ti ti-eye" id="cf-eye" onclick="toggleCF()" style="cursor:pointer;"></i>
          </div>
        </div>
      </div>
      <p style="color:#6b7280; font-size:13px; margin-top:4px;">Questi dati non sono visibili ad altri utenti.</p>
    </div>

    <!-- CAMBIO PASSWORD -->
    <div class="upload-card">
      <div class="upload-card-title"><i class="ti ti-key"></i> Cambia password</div>

      <div class="form-group">
        <label>Nuova password</label>
        <div class="input-icon">
          <input type="password" id="imp-nuova-password" placeholder="Minimo 8 caratteri">
          <i class="ti ti-eye" id="pwd-eye" onclick="togglePasswordImpostazioni()" style="cursor:pointer;"></i>
        </div>
      </div>
      <div class="form-group">
        <label>Conferma nuova password</label>
        <input type="password" id="imp-conferma-password" placeholder="Ripeti la nuova password">
      </div>
      <button class="btn-secondary" onclick="aggiornaPassword()" style="width:auto; padding:10px 20px;">
        <i class="ti ti-key"></i> Aggiorna password
      </button>
    </div>

    <!-- BOTTONI -->
    <div class="upload-bottoni">
      <button class="btn-secondary" onclick="logoutUtente()">
        <i class="ti ti-logout"></i> Esci
      </button>
      <button class="btn-primary" onclick="salvaImpostazioni()">
        <i class="ti ti-device-floppy"></i> Salva modifiche
      </button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>
</html>
