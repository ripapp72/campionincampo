<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampioninCampo — Fai notare il tuo campione</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; overflow: hidden; }
    .bg {
      position: fixed; inset: 0;
      background: url('foto  campo con pallone.jpg') left center / cover no-repeat;
      z-index: 0;
    }
    .overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,10,30,0.22) 50%, rgba(0,15,40,0.35) 100%);
      z-index: 1;
    }
    .content {
      position: relative; z-index: 2;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px; padding-left: 30%;
    }
    .logo-area {
      display: flex; align-items: center; gap: 12px; margin-bottom: 36px;
    }
    .logo-area img { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; }
    .logo-nome { font-size: 24px; font-weight: 700; color: white; letter-spacing: 0.3px; }
    .badge-free {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,220,120,0.18); border: 1px solid rgba(255,220,120,0.45);
      color: #fde68a; padding: 5px 14px; border-radius: 50px;
      font-size: 16px; font-weight: 600; letter-spacing: 0.6px;
      text-transform: uppercase; margin-bottom: 18px;
    }
    .titolo {
      font-size: clamp(52px, 7vw, 86px); font-weight: 800; color: white;
      line-height: 1.1; letter-spacing: -1px; margin-bottom: 18px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    }
    .titolo span { color: #fde68a; }
    .sottotitolo {
      font-size: clamp(20px, 2.8vw, 26px); color: rgba(255,255,255,0.82);
      max-width: 500px; line-height: 1.55; margin-bottom: 44px;
    }
    .bottoni { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .btn-main {
      background: #fde68a; color: #1a1000; border: none;
      padding: 15px 34px; font-size: 20px; font-weight: 700;
      border-radius: 50px; cursor: pointer;
      box-shadow: 0 4px 20px rgba(253,230,138,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(253,230,138,0.45); }
    .btn-ghost {
      background: rgba(255,255,255,0.13); color: white;
      border: 2px solid rgba(255,255,255,0.4);
      padding: 13px 34px; font-size: 20px; font-weight: 600;
      border-radius: 50px; cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); }
    @media (max-width: 768px) {
      .content { padding: 24px 20px; padding-left: 20px; }
      .titolo { font-size: clamp(38px, 10vw, 60px); }
      .sottotitolo { font-size: clamp(16px, 4vw, 20px); margin-bottom: 32px; }
      .logo-nome { font-size: 20px; }
      .bottoni { flex-direction: column; align-items: center; gap: 10px; }
      .btn-main, .btn-ghost { width: 240px; font-size: 17px; padding: 13px 24px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="logo-area">
      <img src="LOGO.jpg" alt="Logo CampioninCampo">
      <span class="logo-nome">CampioninCampo</span>
    </div>
    <div class="badge-free">
      <i class="ti ti-star"></i> 100% gratuito
    </div>
    <h1 class="titolo">
      Fai notare il tuo<br><span>campione</span>
    </h1>
    <p class="sottotitolo">
      Carica video e foto del tuo giovane atleta —<br>
      gli scout ti stanno guardando
    </p>
    <div class="bottoni">
      <button class="btn-main" onclick="location.href='registrazione.html'">
        <i class="ti ti-rocket"></i> Inizia gratis
      </button>
      <button class="btn-ghost" onclick="location.href='home.html'">
        <i class="ti ti-eye"></i> Guarda il feed
      </button>
      <button class="btn-ghost" onclick="location.href='login.html'">
        <i class="ti ti-login"></i> Accedi
      </button>
    </div>
  </div>
</body>
</html>
